steps:
  - name: "python:3.12"
    id: lint-and-typecheck
    entrypoint: bash
    args:
      - -c
      - |
        pip install -r requirements-dev.txt
        ruff check .
        ruff format --check .
        mypy .

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: deploy
    entrypoint: gcloud
    args:
      - functions
      - deploy
      - poll_milon
      - --gen2
      - --runtime=python312
      - --trigger-http
      - --allow-unauthenticated
      - --region=europe-west4
      - --source=.
      - --entry-point=poll_milon
      - --project=$PROJECT_ID

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: schedule
    entrypoint: bash
    args:
      - -c
      - |
        FUNCTION_URL=$(gcloud functions describe poll_milon \
          --region=europe-west4 --gen2 --format="value(serviceConfig.uri)")

        if gcloud scheduler jobs describe poll-milon-scheduler \
            --location=europe-west4 &>/dev/null; then
          gcloud scheduler jobs update http poll-milon-scheduler \
            --location=europe-west4 \
            --schedule="0 */6 * * *" \
            --uri="$$FUNCTION_URL" \
            --http-method=GET \
            --time-zone="Europe/Amsterdam"
        else
          gcloud scheduler jobs create http poll-milon-scheduler \
            --location=europe-west4 \
            --schedule="0 */6 * * *" \
            --uri="$$FUNCTION_URL" \
            --http-method=GET \
            --time-zone="Europe/Amsterdam"
        fi

options:
  logging: CLOUD_LOGGING_ONLY